# Instructor configuration — do NOT submit this file with your assignment.
# Grading uses the course staff copy of this file and data artifacts.

max_labeled: 5000
initial_labeled_count: 500
max_runtime_sec: 60
seeds: [1, 2, 3]

random_forest:
  n_estimators: 100
  n_jobs: -1

data:
  pool: data/pool.csv
  pool_labels: data/.pool_labels.pkl
  feature_columns: data/feature_columns.pkl
  splits_template: data/splits_seed_{seed}.pkl
  test_template: data/test_seed_{seed}.pkl

allowed_imports:
  - numpy
  - pandas
  - sklearn
  - scipy
  - collections
  - warnings
  - typing
